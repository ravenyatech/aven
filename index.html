<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aven • Ravenya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: #EDE9F6;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-text h1 {
            font-size: 2.5rem;
            font-weight: 500;
            color: #2c2c2c;
            margin-bottom: 8px;
        }

        .header-text p {
            font-size: 1rem;
            font-weight: 300;
            color: #666;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 32px;
        }

        .icon-box {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.75rem;
            font-weight: 500;
            color: #2c2c2c;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 24px;
            font-size: 0.95rem;
            color: #666;
            font-weight: 300;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #response {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
            display: none;
        }

        #response.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .header-text h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header-text">
        <h1>Aven</h1>
        <p>Sistema de Geração de Pacientes em 7 dias</p>
    </div>

    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
        </div>
        
        <h2>Assistente de IA</h2>
        <p class="subtitle">Olá! Eu sou a Ave. Estou pronta para te ajudar a gerar pacientes em 7 dias.</p>
        
        <label for="input">Digite sua mensagem:</label>
        <textarea 
            id="input" 
            placeholder="Digite sua pergunta ou solicitação aqui..."
        ></textarea>
        
        <button id="sendBtn">Enviar Mensagem</button>
        
        <div id="response"></div>
    </div>

    <script>
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const responseDiv = document.getElementById('response');

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>Enviando...';
            responseDiv.classList.remove('show');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                
                if (data.error) {
                    responseDiv.textContent = 'Erro: ' + data.error;
                } else {
                    responseDiv.textContent = data.response;
                }
                
                responseDiv.classList.add('show');
            } catch (error) {
                responseDiv.textContent = 'Erro ao conectar com o servidor.';
                responseDiv.classList.add('show');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Enviar Mensagem';
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        init();
    </script>
</body>
</html>
