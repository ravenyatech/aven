<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aven · Ravenya</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      max-width: 720px;
      padding: 24px 20px 12px;
      text-align: center;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #c4b5fd;
      letter-spacing: 0.05em;
    }
    header p {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }
    #chat {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e1e2e;
      color: #e8e8f0;
      border: 1px solid #2d2d42;
      border-bottom-left-radius: 4px;
    }
    .msg.loading {
      color: #6b7280;
      font-style: italic;
    }
    #form {
      width: 100%;
      max-width: 720px;
      padding: 12px 20px 24px;
      display: flex;
      gap: 10px;
    }
    #input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2d2d42;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8f0;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 120px;
    }
    #input:focus { border-color: #4f46e5; }
    #btn {
      background: #4f46e5;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn:hover { background: #4338ca; }
    #btn:disabled { background: #2d2d42; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Aven</h1>
    <p>Assistente da Ravenya · Design Prospective & Estrategia</p>
  </header>
  <div id="chat"></div>
  <div id="form">
    <textarea id="input" placeholder="Escreva sua mensagem..." rows="1"></textarea>
    <button id="btn">Enviar</button>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const messages = [];

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      btn.disabled = true;
      addMsg('user', text);
      messages.push({ role: 'user', content: text });
      const loading = addMsg('assistant loading', 'Aven esta pensando...');
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        const reply = data.content || data.error || 'Erro desconhecido';
        loading.remove();
        addMsg('assistant', reply);
        messages.push({ role: 'assistant', content: reply });
      } catch (e) {
        loading.textContent = 'Erro ao conectar. Tente novamente.';
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Mensagem inicial
    addMsg('assistant', 'Ola! Sou a Aven, assistente da Ravenya. Como posso ajudar voce hoje com design prospective, inovacao ou estrategia?');
  </script>
</body>
</html>
